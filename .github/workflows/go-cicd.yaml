name: Go CI/CD Workflow

on:
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code || (echo "go.mod or go.sum not tidy" && exit 1)

      - name: Build
        run: |
          go build -v ./...

      - name: Test (race + coverage)
        run: |
          go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Generate Summary
        if: always()
        run: |
          echo "# 🧪 Go CI Results" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗 Build: ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Tests: ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY