name: Docker CI/CD Workflow

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: jcukier/discord-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        id: login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Parse version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          IFS='.' read -ra PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Build and push multi-platform image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.major }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign Docker image (keyless)
        if: steps.docker-build.outcome == 'success'
        run: |
          cosign sign --yes ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
          cosign sign --yes ${{ env.DOCKER_IMAGE }}:latest

      - name: Docker Summary
        if: always()
        run: |
          echo "# 🐳 Docker Results" >> $GITHUB_STEP_SUMMARY
          echo "- 🔐 Login: ${{ steps.login.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗 Build: ${{ steps.docker-build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔏 Signed: ${{ steps.docker-build.outcome == 'success' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
