name: Docker CI/CD Workflow

on:
  workflow_call:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Create .env file from secrets
      run: |
        cat > .env << EOF
        DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
        SPOTIFY_ID=${{ secrets.SPOTIFY_ID }}
        SPOTIFY_SECRET=${{ secrets.SPOTIFY_SECRET }}
        SPOTIFY_REDIRECT_URI=${{ secrets.SPOTIFY_REDIRECT_URI }}
        SPOTIFY_PLAYLIST_ID=${{ secrets.SPOTIFY_PLAYLIST_ID }}
        EOF

    - name: Auto-version and tag
      id: version
      run: |
        # Get latest tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        
        # Parse current version
        CURRENT=$(echo $LATEST_TAG | sed 's/^v//')
        IFS='.' read -ra PARTS <<< "$CURRENT"
        MAJOR=${PARTS[0]}
        MINOR=${PARTS[1]}
        PATCH=${PARTS[2]}
        
        # Get commit messages since last tag
        COMMITS=$(git log --pretty=format:"%s" $LATEST_TAG..HEAD)
        
        # Determine version bump
        if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
          BUMP_TYPE="major"
        elif echo "$COMMITS" | grep -q "^feat:"; then
          MINOR=$((MINOR + 1))
          PATCH=0
          BUMP_TYPE="minor"
        else
          PATCH=$((PATCH + 1))
          BUMP_TYPE="patch"
        fi
        
        NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
        
        echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
        echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
        
        echo "Version bump: $BUMP_TYPE ($LATEST_TAG → $NEW_TAG)"
        
        # Create and push tag
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a $NEW_TAG -m "Auto-tag version $NEW_TAG ($BUMP_TYPE)"
        git push origin $NEW_TAG

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: jdcukier/discord-bot
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push multi-platform image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
