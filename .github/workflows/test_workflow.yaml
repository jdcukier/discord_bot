name: Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test
      run: |
        echo "Hello World from GitHub Actions!"
        echo "This is a basic CI/CD test workflow"
        echo "Running on: $(uname -a)"
        echo "Current directory: $(pwd)"
        echo "Files in repository:"
        ls -la