version: '3.8'

services:
  discord-bot:
    build:
      context: .
    image: discord-bot:latest
    container_name: discord-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Optional: Mount logs directory
      - ./logs:/app/logs
    networks:
      - discord-bot-network

networks:
  discord-bot-network:
    driver: bridge
